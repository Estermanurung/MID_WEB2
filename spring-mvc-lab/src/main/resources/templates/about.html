<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>About Us</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        .content-padding { padding: 40px; }
        .tech-list { color: #2c3e50; font-weight: bold; }
    </style>
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Spring MVC Lab</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/products}">Products</a>
            <a class="nav-link active" th:href="@{/about}">About</a> </div>
    </div>
</nav>
<h1>
    Informasi Aplikasi
</h1>
<p>Nama Aplikasi: <span th:text="${appName}">Nama Default</span></p>
<p>Versi: <span th:text="${version}">0.0</span></p>
<hr>
<p>Dibuat Oleh: <strong th:text="${author}">Author</strong></p>
<h3>Tegnologi yang Digunakan:</h3>
<ul>
    <li th:each="tech : ${technologies}" th:text="${tech}" class="tech-list"></li>
</ul>
<br>
<a href="@{/products" class="btn btn-primary">Kembali ke Daftar Produk</a>

</body>
</html>
