<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Category Summary</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Spring MVC Lab</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/products}">Products</a>
            <a class="nav-link" th:href="@{/about}">About</a>
            <a class="nav-link active" th:href="@{/products/categories}">Categories</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 th:text="${title}">Daftar Kategori</h2>

    <div class="list-group mt-3" style="max-width: 500px;">
        <div th:each="cat : ${categories}" class="list-group-item d-flex justify-content-between align-items-center">

            <a th:href="@{/products/category/{nama}(nama=${cat})}"
               th:text="${cat}"
               class="text-decoration-none fw-bold">Nama Kategori</a>

            <span class="badge bg-primary rounded-pill">
                <span th:text="${products.stream().filter(p -> p.category == cat).count()}">0</span> Produk
            </span>

        </div>
    </div>

    <div class="mt-4">
        <a th:href="@{/products}" class="btn btn-secondary">Kembali ke Daftar Produk</a>
    </div>
</div>

</body>
</html>
